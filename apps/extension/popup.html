<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 400px;
      margin: 0;
      padding: 0;
      background: white;
      color: #1c1e21;
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .title {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }
    header .badge {
      background: #fef3c7;
      color: #92400e;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .detected {
      padding: 8px 16px;
      font-size: 12px;
      color: #65676b;
      border-bottom: 1px solid #f0f0f0;
    }
    .detected b { color: #1c1e21; }
    .warn-box {
      margin: 8px 16px;
      padding: 8px 10px;
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 6px;
      font-size: 12px;
      color: #874d00;
    }
    .section {
      padding: 12px 16px 4px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #65676b;
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .pill {
      flex: 1;
      padding: 6px 10px;
      background: #f0f2f5;
      border: 1px solid #e4e6eb;
      border-radius: 999px;
      font-size: 12px;
      color: #1c1e21;
      text-align: center;
      cursor: default;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e4e6eb;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      color: #1c1e21;
      cursor: pointer;
    }

    /* ── Range sliders ── */
    .range-section {
      padding: 10px 16px 4px;
    }
    .range-row {
      margin-bottom: 10px;
    }
    .range-row label {
      font-size: 13px;
      font-weight: 600;
      color: #1c1e21;
      margin-bottom: 4px;
      display: block;
    }
    .range-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .range-value {
      font-size: 14px;
      font-weight: 700;
      color: #a855f7;
    }
    .range-row input[type="range"] {
      width: 100%;
      height: 4px;
      accent-color: #a855f7;
      cursor: pointer;
      display: block;
    }
    .reset-filters-link {
      display: block;
      text-align: right;
      font-size: 11px;
      color: #a855f7;
      cursor: pointer;
      margin-top: 2px;
      margin-bottom: 4px;
      text-decoration: underline;
    }
    .info-note {
      font-size: 11px;
      color: #999;
      padding: 4px 16px 8px;
      margin: 0;
      font-style: italic;
    }

    .sort-list {
      padding: 4px 8px 8px;
    }
    .sort-btn {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 4px;
      text-align: left;
      background: white;
      color: #1c1e21;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .sort-btn:hover { background: #f5f5f5; }
    .sort-btn.active {
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
    }
    .sort-btn .icon {
      width: 18px;
      text-align: center;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 8px 0 0;
    }

    /* ── Action buttons ── */
    .action-btns {
      padding: 10px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .action-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.88; }
    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-purple { background: #a855f7; color: white; }
    .btn-blue   { background: #3b82f6; color: white; }
    .btn-gray   { background: #6b7280; color: white; }
    .btn-outline {
      background: white;
      color: #65676b;
      border: 1px solid #e4e6eb;
      font-weight: 400;
      font-size: 13px;
      padding: 8px 12px;
    }

    #status {
      margin: 4px 16px 12px;
      min-height: 18px;
      font-size: 12px;
      text-align: center;
      color: #65676b;
    }
    #status.success { color: #16a34a; }
    #status.error   { color: #dc2626; }
    #status.warn    { color: #d97706; }
  </style>
</head>
<body>
  <header>
    <span style="font-size:18px;">🔮</span>
    <span class="title">SocialDrop</span>
    <span class="badge">FREE</span>
  </header>

  <div class="detected" id="detected">Detectando...</div>

  <div id="not-instagram" class="warn-box" style="display:none">
    ⚠️ Abre un perfil de Instagram para usar las herramientas.
  </div>

  <div id="tools" style="display:none">

    <!-- FILTROS -->
    <div class="section">
      <div class="section-title">Filtros</div>
      <div class="row">
        <span class="pill">📷 Posts</span>
        <span class="pill">📅 Date</span>
      </div>
      <select id="limitSelect">
        <option value="25">Latest 25 Posts (free)</option>
        <option value="50">Latest 50 Posts</option>
        <option value="100">Latest 100 Posts</option>
        <option value="0">All Posts</option>
      </select>
    </div>

    <!-- RANGOS MÍNIMOS -->
    <div class="range-section">
      <div class="section-title">Rangos mínimos</div>

      <div class="range-row">
        <div class="range-header">
          <label for="viewsRange">👁 Views mínimas</label>
          <span class="range-value" id="viewsVal">0</span>
        </div>
        <input type="range" id="viewsRange" min="0" max="1000000" step="1000" value="0">
      </div>

      <div class="range-row">
        <div class="range-header">
          <label for="likesRange">♥ Likes mínimos</label>
          <span class="range-value" id="likesVal">0</span>
        </div>
        <input type="range" id="likesRange" min="0" max="100000" step="500" value="0">
      </div>

      <div class="range-row">
        <div class="range-header">
          <label for="commentsRange">💬 Comentarios mínimos</label>
          <span class="range-value" id="commentsVal">0</span>
        </div>
        <input type="range" id="commentsRange" min="0" max="10000" step="100" value="0">
      </div>

      <span class="reset-filters-link" id="resetFiltersLink">Resetear filtros</span>
    </div>

    <p class="info-note">
      ℹ️ Las métricas se leen al abrir cada post. Usa "Ordenar por" para reorganizar el feed.
    </p>

    <!-- ORDENAR -->
    <div class="section">
      <div class="section-title">Ordenar</div>
    </div>
    <div class="sort-list">
      <button class="sort-btn" data-sort="likes">
        <span class="icon">♥</span><span>Likes</span>
      </button>
      <button class="sort-btn" data-sort="views">
        <span class="icon">▷</span><span>Views</span>
      </button>
      <button class="sort-btn" data-sort="comments">
        <span class="icon">💬</span><span>Comments</span>
      </button>
      <button class="sort-btn" data-sort="oldest">
        <span class="icon">🕐</span><span>Oldest</span>
      </button>
      <button class="sort-btn" data-sort="reset" style="color:#65676b;">
        <span class="icon">↺</span><span>Restablecer orden</span>
      </button>
    </div>

    <hr>

    <!-- ACTION BUTTONS -->
    <div class="action-btns">
      <button class="action-btn btn-purple" id="saveBtn">
        💾 Guardar en SocialDrop
      </button>
      <button class="action-btn btn-blue" id="saveMetricsBtn">
        📊 Guardar con métricas
      </button>
      <button class="action-btn btn-gray" id="exportCsvBtn">
        ⬇️ Exportar CSV
      </button>
      <button class="action-btn btn-outline" id="reloadBtn">
        ↺ Recargar página
      </button>
    </div>

    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
