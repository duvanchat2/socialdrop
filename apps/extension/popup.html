<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      background: white;
      color: #1c1e21;
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      font-size: 14px;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    header .title {
      font-size: 16px;
      font-weight: 700;
      flex: 1;
    }
    header .badge {
      background: #fef3c7;
      color: #92400e;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }
    .detected {
      padding: 8px 16px;
      font-size: 12px;
      color: #65676b;
      border-bottom: 1px solid #f0f0f0;
    }
    .detected b { color: #1c1e21; }
    .warn-box {
      margin: 8px 16px;
      padding: 8px 10px;
      background: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 6px;
      font-size: 12px;
      color: #874d00;
    }
    .section {
      padding: 12px 16px 4px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #65676b;
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .pill {
      flex: 1;
      padding: 6px 10px;
      background: #f0f2f5;
      border: 1px solid #e4e6eb;
      border-radius: 999px;
      font-size: 12px;
      color: #1c1e21;
      text-align: center;
      cursor: default;
    }
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #e4e6eb;
      border-radius: 8px;
      background: white;
      font-size: 13px;
      color: #1c1e21;
      cursor: pointer;
    }
    .sort-list {
      padding: 4px 8px 8px;
    }
    .sort-btn {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 4px;
      text-align: left;
      background: white;
      color: #1c1e21;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      border-radius: 8px;
      transition: background 0.12s;
    }
    .sort-btn:hover { background: #f5f5f5; }
    .sort-btn.active {
      background: #fef3c7;
      color: #92400e;
      font-weight: 600;
    }
    .sort-btn .icon {
      width: 18px;
      text-align: center;
    }
    hr {
      border: none;
      border-top: 1px solid #eee;
      margin: 8px 0 0;
    }
    .sync-btn {
      width: calc(100% - 32px);
      margin: 12px 16px;
      padding: 12px;
      background: #a855f7;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .sync-btn:hover { background: #9333ea; }
    .sync-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    #status {
      margin: 0 16px 12px;
      min-height: 18px;
      font-size: 12px;
      text-align: center;
      color: #65676b;
    }
    #status.success { color: #16a34a; }
    #status.error { color: #dc2626; }
    #status.warn { color: #d97706; }
  </style>
</head>
<body>
  <header>
    <span style="font-size:18px;">🔮</span>
    <span class="title">SocialDrop</span>
    <span class="badge">FREE</span>
  </header>

  <div class="detected" id="detected">Detectando...</div>

  <div id="not-instagram" class="warn-box" style="display:none">
    ⚠️ Abre un perfil de Instagram para usar las herramientas.
  </div>

  <div id="tools" style="display:none">
    <div class="section">
      <div class="section-title">Filtros</div>
      <div class="row">
        <span class="pill">📷 Posts</span>
        <span class="pill">📅 Date</span>
      </div>
      <select id="limitSelect">
        <option value="25">Latest 25 Posts (free)</option>
        <option value="50">Latest 50 Posts</option>
        <option value="100">Latest 100 Posts</option>
        <option value="0">All Posts</option>
      </select>
    </div>

    <div class="section">
      <div class="section-title">Ordenar</div>
    </div>
    <div class="sort-list">
      <button class="sort-btn" data-sort="likes">
        <span class="icon">♥</span><span>Likes</span>
      </button>
      <button class="sort-btn" data-sort="views">
        <span class="icon">▷</span><span>Views</span>
      </button>
      <button class="sort-btn" data-sort="comments">
        <span class="icon">💬</span><span>Comments</span>
      </button>
      <button class="sort-btn" data-sort="oldest">
        <span class="icon">🕐</span><span>Oldest</span>
      </button>
      <button class="sort-btn" data-sort="reset" style="color:#65676b;">
        <span class="icon">↺</span><span>Restablecer orden</span>
      </button>
    </div>

    <hr>

    <button class="sync-btn" id="syncBtn">
      ✨ Sincronizar con SocialDrop
    </button>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
