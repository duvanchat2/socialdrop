<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui;
      background: #0f172a;
      color: #f1f5f9;
    }
    h2 {
      margin: 0 0 4px;
      font-size: 16px;
      color: #a855f7;
    }
    p { margin: 0 0 12px; font-size: 12px; color: #94a3b8; }
    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #f1f5f9;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #a855f7;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 20px;
      color: #94a3b8;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .warning {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      color: #fbbf24;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h2>🔮 SocialDrop Analyzer</h2>
  <p>Analiza competidores de Instagram</p>

  <div id="not-instagram" class="warning" style="display:none">
    ⚠️ Navega a un perfil de Instagram para analizar
  </div>

  <div id="instagram-detected" style="display:none">
    <p id="detected-user" style="color:#4ade80; margin-bottom:8px;"></p>
  </div>

  <label style="font-size:12px; color:#94a3b8;">
    URL de SocialDrop:
  </label>
  <input
    id="apiUrl"
    placeholder="https://app.socialdrop.online"
    type="url"
  />

  <button id="analyzeBtn">Analizar este perfil</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
