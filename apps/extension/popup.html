<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialDrop Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .title { font-size: 14px; font-weight: 700; }
    .subtitle { font-size: 10px; color: #64748b; }

    .badge {
      font-size: 11px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 10px;
      color: #94a3b8;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .badge b { color: #e2e8f0; }

    label {
      font-size: 11px;
      color: #64748b;
      display: block;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 7px 10px;
      color: #f1f5f9;
      font-size: 12px;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }

    button {
      width: 100%;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: #4ade80; }
    .status.error   { color: #f87171; }
    .status.loading { color: #94a3b8; }

    .progress {
      margin-top: 8px;
      height: 3px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: #6366f1;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .not-instagram {
      text-align: center;
      padding: 20px 0;
      color: #64748b;
      font-size: 12px;
    }
    .not-instagram .icon { font-size: 32px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎯</div>
    <div>
      <div class="title">SocialDrop Analyzer</div>
      <div class="subtitle">Inteligencia Competitiva</div>
    </div>
  </div>

  <div id="not-instagram" class="not-instagram" style="display:none">
    <div class="icon">📸</div>
    <p>Navega a un perfil de Instagram<br/>para analizar</p>
  </div>

  <div id="main-content">
    <div id="profile-badge" class="badge">Detectando perfil…</div>

    <label>URL de SocialDrop API</label>
    <input id="api-url" type="url" placeholder="https://app.socialdrop.online" />

    <button id="analyze-btn">🔍 Analizar este perfil</button>

    <div class="progress"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
