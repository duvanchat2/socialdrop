name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy socialdrop
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/socialdrop

            echo "=== Pulling latest changes ==="
            git pull origin main

            echo "=== Installing dependencies ==="
            npm install --silent

            echo "=== Building API ==="
            npx nx build api --skip-nx-cache

            echo "=== Restarting socialdrop services ==="
            pm2 restart socialdrop-api socialdrop-web
            pm2 save

            echo "=== Deploy complete ==="
            pm2 list
