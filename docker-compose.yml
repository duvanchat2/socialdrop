version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: socialdrop-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-socialdrop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socialdrop_secret}
      POSTGRES_DB: ${POSTGRES_DB:-socialdrop}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-socialdrop}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialdrop-network

  redis:
    image: redis:7-alpine
    container_name: socialdrop-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - socialdrop-network

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: socialdrop-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-socialdrop}:${POSTGRES_PASSWORD:-socialdrop_secret}@postgres:5432/${POSTGRES_DB:-socialdrop}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI}
      YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET}
      FACEBOOK_REDIRECT_URI: ${FACEBOOK_REDIRECT_URI}
      FACEBOOK_PAGE_ID: ${FACEBOOK_PAGE_ID}
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
      INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET}
      TIKTOK_REDIRECT_URI: ${TIKTOK_REDIRECT_URI}
      X_API_KEY: ${X_API_KEY}
      X_API_SECRET: ${X_API_SECRET}
      X_ACCESS_TOKEN: ${X_ACCESS_TOKEN}
      X_ACCESS_SECRET: ${X_ACCESS_SECRET}
      X_REDIRECT_URI: ${X_REDIRECT_URI}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      UPLOAD_DIRECTORY: /app/uploads
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialdrop-network

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: socialdrop-web
    restart: unless-stopped
    ports:
      - '4200:4200'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - socialdrop-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

networks:
  socialdrop-network:
    driver: bridge
